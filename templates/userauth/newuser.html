<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | FoodieCrave</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 flex items-center justify-center p-4">

    <!-- Register Card -->
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        
        <!-- Header Section -->
        <div class="bg-gradient-to-br from-orange-500 to-red-600 p-8 text-center relative overflow-hidden">
            <!-- Decorative circle -->
            <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-white opacity-10 rounded-full blur-xl"></div>
            
            <h2 class="text-3xl font-bold text-white mb-2">Create Account</h2>
            <p class="text-orange-100">Join us to start your culinary journey.</p>
        </div>

        <!-- Form Section -->
        <div class="p-8">
            <form method="POST" action="{% url 'userauth:newuser' %}">
                {% csrf_token %}
                
                <!-- Custom Message/Error Block -->
                {% if message %}
                <div class="mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-r">
                    <div class="flex">
                        <div class="flex-shrink-0">
                            <i data-lucide="alert-circle" class="h-5 w-5 text-red-500"></i>
                        </div>
                        <div class="ml-3">
                            <p class="text-sm text-red-700">
                                {{ message }}
                            </p>
                        </div>
                    </div>
                </div>
                {% endif %}

                <div class="space-y-5">
                    <!-- Username Input -->
                    <div>
                        <label for="id_username" class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-orange-500 transition-colors">
                                <i data-lucide="user" width="20" height="20"></i>
                            </div>
                            <input 
                                type="text" 
                                name="username" 
                                id="id_username" 
                                required
                                autocomplete="off"
                                class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-orange-500 focus:ring-4 focus:ring-orange-100 outline-none transition-all bg-slate-50 focus:bg-white"
                                placeholder="Choose a username"
                            >
                        </div>
                    </div>

                    <!-- Email Input -->
                    <div>
                        <label for="id_email" class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-orange-500 transition-colors">
                                <i data-lucide="mail" width="20" height="20"></i>
                            </div>
                            <input 
                                type="email" 
                                name="email" 
                                id="id_email" 
                                required
                                autocomplete="off"
                                class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-orange-500 focus:ring-4 focus:ring-orange-100 outline-none transition-all bg-slate-50 focus:bg-white"
                                placeholder="Enter your email"
                            >
                        </div>
                    </div>

                    <!-- Password Input -->
                    <div>
                        <label for="id_password" class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-orange-500 transition-colors">
                                <i data-lucide="lock" width="20" height="20"></i>
                            </div>
                            <input 
                                type="password" 
                                name="password" 
                                id="id_password" 
                                required
                                class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-orange-500 focus:ring-4 focus:ring-orange-100 outline-none transition-all bg-slate-50 focus:bg-white"
                                placeholder="Create a password"
                            >
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="w-full bg-slate-900 hover:bg-orange-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg hover:shadow-orange-200 flex items-center justify-center gap-2 group">
                        <span>Create User</span>
                        <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>
            </form>

            <!-- Links & Footer -->
            <div class="mt-8 flex flex-col items-center gap-4 text-sm">
                <p class="text-slate-500">
                    Already have an account? 
                    <a href="{% url 'userauth:login' %}" class="font-bold text-orange-600 hover:text-orange-700 hover:underline">
                        Log in
                    </a>
                </p>
                
                <div class="w-full border-t border-slate-100"></div>

                <a href="{% url 'index' %}" class="flex items-center gap-2 text-slate-400 hover:text-slate-600 transition-colors font-medium">
                    <i data-lucide="arrow-left" width="16" height="16"></i>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
